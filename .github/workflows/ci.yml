name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  quality:
    name: Format, lint, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable

      - uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true
          python-version: "3.11"

      - run: uv sync --locked
      - run: uv run --locked ruff format --check km003c_analysis scripts tests
      - run: uv run --locked ruff check km003c_analysis scripts tests
      - run: uv run --locked rumdl check README.md docs tests/README.md
      - run: uv run --locked python scripts/check_markdown_links.py
      - run: uv run --locked pytest -q
